services:
  # 1. Solo la Base de Datos
  db:
    image: postgres:15-alpine
    container_name: django_postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=mi_django_db
      - POSTGRES_USER=mi_usuario
      - POSTGRES_PASSWORD=mi_contraseña_secreta
    ports:
      - "5432:5432" # <-- ESTO ES CLAVE: Abre la puerta para tu Django local

  # 2. Solo pgAdmin
  pgadmin:
    image: dpage/pgadmin4
    container_name: django_pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: